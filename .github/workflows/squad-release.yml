name: Squad Release
# python project — configure build, test, and release commands below

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install SDL system dependencies
        run: sudo apt-get update && sudo apt-get install -y libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: python -m pytest

      - name: Read version from VERSION file
        id: version
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "📦 Version: $VERSION (tag: v$VERSION)"

      - name: Build release package
        run: |
          python scripts/package_release.py
          echo "✅ Release ZIP created"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          ZIP="mr-pumpkin-v${{ steps.version.outputs.version }}.zip"
          # Find the most recent semver tag that isn't the current one
          PREV_TAG=$(git tag --sort=-version:refname \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | grep -v "^${TAG}$" \
            | head -1)
          if gh release view "$TAG" > /dev/null 2>&1; then
            gh release upload "$TAG" "$ZIP" --clobber
          elif [ -n "$PREV_TAG" ]; then
            gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes \
              --notes-start-tag "$PREV_TAG" \
              --latest \
              "$ZIP"
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes \
              --latest \
              "$ZIP"
          fi

      - name: Verify release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${{ steps.version.outputs.tag }}"
          echo "✅ Release ${{ steps.version.outputs.tag }} created and verified."