<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mr. Pumpkin WebSocket Test Client</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 20px auto;
      padding: 20px;
      background: #1a1a1a;
      color: #e0e0e0;
    }
    h1 {
      color: #ff9800;
      border-bottom: 2px solid #ff9800;
      padding-bottom: 10px;
    }
    h2 {
      color: #ffa726;
      margin-top: 25px;
      font-size: 18px;
    }
    
    /* Connection Status Section */
    #connection-status {
      padding: 15px;
      border-radius: 5px;
      margin: 20px 0;
      font-weight: bold;
      background: #333;
    }
    .status-connected {
      background: #2e7d32 !important;
      color: #fff;
    }
    .status-disconnected {
      background: #c62828 !important;
      color: #fff;
    }
    .status-connecting {
      background: #f57c00 !important;
      color: #fff;
    }
    
    /* Command Input Section */
    .input-group {
      display: flex;
      gap: 10px;
      margin: 15px 0;
    }
    input[type="text"], textarea {
      flex: 1;
      padding: 10px;
      border: 1px solid #555;
      border-radius: 4px;
      background: #2a2a2a;
      color: #e0e0e0;
      font-size: 14px;
      font-family: 'Courier New', monospace;
    }
    button {
      padding: 10px 20px;
      background: #ff9800;
      color: #000;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      font-size: 14px;
    }
    button:hover {
      background: #ffa726;
    }
    button:active {
      background: #fb8c00;
    }
    button:disabled {
      background: #555;
      color: #888;
      cursor: not-allowed;
    }
    
    /* Quick Test Buttons */
    .test-buttons {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 10px;
      margin: 15px 0;
    }
    .test-button {
      padding: 12px;
      background: #424242;
      border: 1px solid #666;
      font-size: 13px;
    }
    .test-button:hover {
      background: #616161;
    }
    
    /* Log/Response Section */
    #log {
      background: #000;
      color: #0f0;
      padding: 15px;
      border-radius: 5px;
      height: 400px;
      overflow-y: auto;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.5;
      border: 1px solid #333;
    }
    .log-entry {
      margin: 5px 0;
      padding: 3px 0;
    }
    .log-sent {
      color: #64b5f6;
    }
    .log-received {
      color: #81c784;
    }
    .log-error {
      color: #e57373;
      font-weight: bold;
    }
    .log-info {
      color: #ffd54f;
    }
    .log-timestamp {
      color: #757575;
      font-size: 11px;
    }
    
    /* Timeline Upload Section */
    #timeline-input {
      width: 100%;
      height: 150px;
      margin: 10px 0;
      font-family: 'Courier New', monospace;
      font-size: 12px;
    }
    
    /* Connection Info */
    .info-box {
      background: #2a2a2a;
      padding: 10px;
      border-radius: 4px;
      margin: 10px 0;
      font-size: 13px;
      border-left: 3px solid #ff9800;
    }
    .info-label {
      font-weight: bold;
      color: #ff9800;
    }
  </style>
</head>
<body>
  <h1>🎃 Mr. Pumpkin WebSocket Test Client</h1>
  
  <!-- Connection Status -->
  <div id="connection-status" class="status-disconnected">
    ● DISCONNECTED
  </div>
  
  <!-- Connection Details -->
  <div class="info-box">
    <div><span class="info-label">WebSocket URL:</span> <span id="ws-url">ws://localhost:5001</span></div>
    <div><span class="info-label">Ready State:</span> <span id="ready-state">CLOSED (3)</span></div>
    <div><span class="info-label">Protocol:</span> Text-based commands (same format as TCP)</div>
  </div>
  
  <!-- Manual Command Input -->
  <h2>Manual Command</h2>
  <div class="input-group">
    <input type="text" id="command-input" placeholder="Enter command (e.g., blink, timeline_status, gaze 0 45)" />
    <button onclick="sendCommand()" id="send-btn">Send</button>
    <button onclick="clearLog()">Clear Log</button>
  </div>
  
  <!-- Quick Test Buttons -->
  <h2>Quick Test Commands</h2>
  <div class="test-buttons">
    <button class="test-button" onclick="sendQuick('blink')">Test: blink</button>
    <button class="test-button" onclick="sendQuick('timeline_status')">Test: timeline_status</button>
    <button class="test-button" onclick="sendQuick('gaze 0 45')">Test: gaze 0 45</button>
    <button class="test-button" onclick="sendQuick('happy')">Test: happy</button>
    <button class="test-button" onclick="sendQuick('neutral')">Test: neutral</button>
    <button class="test-button" onclick="sendQuick('list_recordings')">Test: list_recordings</button>
  </div>
  
  <!-- Timeline Upload Test -->
  <h2>Test: Upload Timeline (Multi-line JSON)</h2>
  <textarea id="timeline-input" placeholder='Enter timeline JSON, e.g.:
{
  "version": "1.0",
  "duration_ms": 2000,
  "commands": [
    {"time_ms": 0, "command": "neutral", "args": []},
    {"time_ms": 1000, "command": "happy", "args": []}
  ]
}'></textarea>
  <button onclick="uploadTimeline()">Upload Timeline</button>
  
  <!-- Connection Control -->
  <h2>Connection Control</h2>
  <div class="input-group">
    <button onclick="reconnect()">Reconnect</button>
    <button onclick="disconnect()">Disconnect</button>
  </div>
  
  <!-- Response Log -->
  <h2>Event Log</h2>
  <div id="log"></div>
  
  <script>
    // WebSocket connection and state tracking
    let ws = null;
    let wsUrl = 'ws://localhost:5001';
    let connectionAttempts = 0;
    let maxAttempts = 2;
    
    // Initialize connection on page load
    window.onload = function() {
      connectWebSocket();
      
      // Allow Enter key to send command
      document.getElementById('command-input').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
          sendCommand();
        }
      });
    };
    
    /**
     * Connect to WebSocket server
     * Tries localhost:5001, then fallback to 127.0.0.1:5001
     */
    function connectWebSocket() {
      // Try alternate URL if primary failed
      if (connectionAttempts === 1) {
        wsUrl = 'ws://127.0.0.1:5001';
        log('Trying fallback URL: ' + wsUrl, 'info');
      }
      
      updateConnectionStatus('connecting', 'CONNECTING...');
      document.getElementById('ws-url').textContent = wsUrl;
      
      try {
        ws = new WebSocket(wsUrl);
        
        // Connection opened
        ws.onopen = function(event) {
          connectionAttempts = 0; // Reset attempts on success
          updateConnectionStatus('connected', '● CONNECTED');
          updateReadyState();
          log('WebSocket connection established', 'info');
          log('Ready to send commands', 'info');
        };
        
        // Message received from server
        ws.onmessage = function(event) {
          log('← ' + event.data, 'received');
          updateReadyState();
        };
        
        // Connection closed
        ws.onclose = function(event) {
          updateConnectionStatus('disconnected', '● DISCONNECTED');
          updateReadyState();
          
          if (event.wasClean) {
            log(`Connection closed cleanly (code=${event.code}, reason=${event.reason || 'none'})`, 'info');
          } else {
            log('Connection lost unexpectedly', 'error');
            
            // Attempt fallback if first attempt failed
            if (connectionAttempts < maxAttempts) {
              connectionAttempts++;
              log('Retrying with alternate URL...', 'info');
              setTimeout(connectWebSocket, 1000);
            }
          }
        };
        
        // Connection error
        ws.onerror = function(error) {
          log('WebSocket error occurred', 'error');
          updateReadyState();
        };
        
      } catch (error) {
        log('Failed to create WebSocket: ' + error.message, 'error');
        updateConnectionStatus('disconnected', '● DISCONNECTED');
      }
    }
    
    /**
     * Send command from input field
     */
    function sendCommand() {
      const input = document.getElementById('command-input');
      const command = input.value.trim();
      
      if (!command) {
        log('No command entered', 'error');
        return;
      }
      
      if (!ws || ws.readyState !== WebSocket.OPEN) {
        log('Cannot send: WebSocket not connected', 'error');
        return;
      }
      
      try {
        ws.send(command);
        log('→ ' + command, 'sent');
        input.value = ''; // Clear input after sending
        updateReadyState();
      } catch (error) {
        log('Failed to send command: ' + error.message, 'error');
      }
    }
    
    /**
     * Send quick test command
     */
    function sendQuick(command) {
      if (!ws || ws.readyState !== WebSocket.OPEN) {
        log('Cannot send: WebSocket not connected', 'error');
        return;
      }
      
      try {
        ws.send(command);
        log('→ ' + command, 'sent');
        updateReadyState();
      } catch (error) {
        log('Failed to send command: ' + error.message, 'error');
      }
    }
    
    /**
     * Upload timeline JSON (multi-line test)
     */
    function uploadTimeline() {
      const timelineText = document.getElementById('timeline-input').value.trim();
      
      if (!timelineText) {
        log('No timeline JSON entered', 'error');
        return;
      }
      
      // Validate JSON format
      try {
        const timelineObj = JSON.parse(timelineText);
        
        // Basic validation
        if (!timelineObj.version || !timelineObj.commands) {
          log('Invalid timeline structure: missing version or commands', 'error');
          return;
        }
        
        // Build upload_timeline command
        // Format: upload_timeline <filename> <json_string>
        const filename = 'test_timeline_' + Date.now() + '.json';
        const jsonString = JSON.stringify(timelineObj);
        const command = `upload_timeline ${filename} ${jsonString}`;
        
        if (!ws || ws.readyState !== WebSocket.OPEN) {
          log('Cannot send: WebSocket not connected', 'error');
          return;
        }
        
        ws.send(command);
        log('→ upload_timeline ' + filename, 'sent');
        log('  JSON: ' + jsonString.substring(0, 100) + '...', 'sent');
        updateReadyState();
        
      } catch (error) {
        log('Invalid JSON: ' + error.message, 'error');
      }
    }
    
    /**
     * Reconnect to WebSocket
     */
    function reconnect() {
      log('Manual reconnect initiated', 'info');
      disconnect();
      connectionAttempts = 0;
      setTimeout(connectWebSocket, 500);
    }
    
    /**
     * Gracefully disconnect WebSocket
     */
    function disconnect() {
      if (ws) {
        if (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING) {
          ws.close(1000, 'Manual disconnect');
          log('Disconnecting...', 'info');
        } else {
          log('Already disconnected', 'info');
        }
      }
    }
    
    /**
     * Update connection status indicator
     */
    function updateConnectionStatus(state, text) {
      const statusDiv = document.getElementById('connection-status');
      statusDiv.className = 'status-' + state;
      statusDiv.textContent = text;
    }
    
    /**
     * Update WebSocket ready state display
     */
    function updateReadyState() {
      const stateSpan = document.getElementById('ready-state');
      
      if (!ws) {
        stateSpan.textContent = 'NOT INITIALIZED';
        return;
      }
      
      const states = {
        0: 'CONNECTING',
        1: 'OPEN',
        2: 'CLOSING',
        3: 'CLOSED'
      };
      
      const stateName = states[ws.readyState] || 'UNKNOWN';
      stateSpan.textContent = `${stateName} (${ws.readyState})`;
    }
    
    /**
     * Add log entry to event log
     */
    function log(message, type = 'info') {
      const logDiv = document.getElementById('log');
      const timestamp = new Date().toLocaleTimeString('en-US', { hour12: false, fractionalSecondDigits: 3 });
      
      const entry = document.createElement('div');
      entry.className = 'log-entry log-' + type;
      entry.innerHTML = `<span class="log-timestamp">[${timestamp}]</span> ${escapeHtml(message)}`;
      
      logDiv.appendChild(entry);
      
      // Auto-scroll to bottom
      logDiv.scrollTop = logDiv.scrollHeight;
    }
    
    /**
     * Clear event log
     */
    function clearLog() {
      document.getElementById('log').innerHTML = '';
      log('Log cleared', 'info');
    }
    
    /**
     * Escape HTML for safe display
     */
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  </script>
</body>
</html>
